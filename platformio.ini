[env:esp32-c3-devkitm-1]
platform  = espressif32
board     = esp32-c3-devkitm-1
framework = arduino

; ── Serial via USB-CDC (no UART adapter needed) ──────────────────────────────
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

monitor_speed  = 115200
monitor_filters = esp32_exception_decoder

; ── Libraries ─────────────────────────────────────────────────────────────────
; U8g2 covers the 0.42" SSD1306 72x40 OLED.
; BLE is part of the ESP32 arduino framework — no extra entry needed.
lib_deps =
    olikraus/U8g2 @ ^2.35.7
